services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      AIPMOS_DATABASE_URL: postgresql+asyncpg://aipmos:aipmos@postgres:5432/aipmos
      AIPMOS_REDIS_URL: redis://redis:6379/0
      AIPMOS_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AIPMOS_JWT_SECRET_KEY: local-development-secret
    ports:
      - "8000:8000"
    depends_on: [postgres, redis, kafka]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "8080:80"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aipmos
      POSTGRES_PASSWORD: aipmos
      POSTGRES_DB: aipmos
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
